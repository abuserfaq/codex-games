    <header class="game-header">
      <h1>Whac-A-Mole</h1>
      <p>Hit the mole before it ducks back underground.</p>
    </header>

    <div class="play-panel square-board mole-board" id="board" aria-label="Whac-A-Mole game board"></div>
    <div class="statusbar" role="status">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="time">30</strong></span>
      <button class="button" id="restart" type="button">Restart</button>
    </div>
    <p class="hint" id="message">Click or tap the active mole.</p>
  </main>

  <script>
    const boardEl = document.querySelector("#board");
    const scoreEl = document.querySelector("#score");
    const timeEl = document.querySelector("#time");
    const messageEl = document.querySelector("#message");
    const restartButton = document.querySelector("#restart");

    let cells = [];
    let active = -1;
    let score = 0;
    let timeLeft = 30;
    let moleTimer;
    let clockTimer;
    let running = false;

    function drawBoard() {
      boardEl.innerHTML = "";
      cells = Array.from({ length: 9 }, (_, index) => {
        const button = document.createElement("button");
        button.className = "mole-cell";
        button.type = "button";
        button.setAttribute("aria-label", `Hole ${index + 1}`);
        button.addEventListener("click", () => hit(index));
        boardEl.appendChild(button);
        return button;
      });
    }

    function showMole() {
      if (!running) return;
      if (active >= 0) cells[active].classList.remove("active");
      active = Math.floor(Math.random() * cells.length);
      cells[active].classList.add("active");
    }

    function hit(index) {
      if (!running || index !== active) return;
      score += 1;
      scoreEl.textContent = score;
      cells[active].classList.remove("active");
      active = -1;
      showMole();
    }

    function finish() {
      running = false;
      window.clearInterval(moleTimer);
      window.clearInterval(clockTimer);
      if (active >= 0) cells[active].classList.remove("active");
      active = -1;
      messageEl.textContent = `Time up. Score: ${score}.`;
    }

    function reset() {
      window.clearInterval(moleTimer);
      window.clearInterval(clockTimer);
      score = 0;
      timeLeft = 30;
      active = -1;
      running = true;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      messageEl.textContent = "Click or tap the active mole.";
      cells.forEach((cell) => cell.classList.remove("active"));
      showMole();
      moleTimer = window.setInterval(showMole, 760);
      clockTimer = window.setInterval(() => {
        timeLeft -= 1;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) finish();
      }, 1000);
    }

    drawBoard();
    restartButton.addEventListener("click", reset);
    reset();
  </script>
