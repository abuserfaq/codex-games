    <header class="game-header">
      <h1>Minesweeper</h1>
      <p>Open safe squares, flag mines, and clear the board.</p>
    </header>

    <div class="statusbar" role="status">
      <span>Mines: <strong id="minesLeft">10</strong></span>
      <span id="message">Open a safe square.</span>
    </div>
    <div class="mines-board" id="board" aria-label="Minesweeper board"></div>
    <div class="statusbar">
      <span class="hint">Click to open. Right-click to flag a mine.</span>
      <button class="button" id="restart" type="button">Restart</button>
    </div>
  </main>

  <script>
    const boardEl = document.querySelector("#board");
    const minesLeftEl = document.querySelector("#minesLeft");
    const messageEl = document.querySelector("#message");
    const restartButton = document.querySelector("#restart");

    const size = 9;
    const mineCount = 10;
    const cells = [];
    let gameOver = false;

    function neighbors(index) {
      const x = index % size;
      const y = Math.floor(index / size);
      const result = [];

      for (let yy = y - 1; yy <= y + 1; yy += 1) {
        for (let xx = x - 1; xx <= x + 1; xx += 1) {
          if (xx === x && yy === y) continue;
          if (xx >= 0 && xx < size && yy >= 0 && yy < size) {
            result.push(yy * size + xx);
          }
        }
      }

      return result;
    }

    function setMines() {
      let placed = 0;
      while (placed < mineCount) {
        const index = Math.floor(Math.random() * cells.length);
        if (!cells[index].mine) {
          cells[index].mine = true;
          placed += 1;
        }
      }
    }

    function updateMineCounts() {
      cells.forEach((cell, index) => {
        cell.count = neighbors(index).filter((neighbor) => cells[neighbor].mine).length;
      });
    }

    function updateFlags() {
      const flags = cells.filter((cell) => cell.flagged).length;
      minesLeftEl.textContent = mineCount - flags;
    }

    function revealAll() {
      cells.forEach((cell) => {
        if (cell.mine) {
          cell.button.textContent = "M";
          cell.button.classList.add("mine");
        }
        cell.button.disabled = true;
      });
    }

    function checkWin() {
      const safeOpen = cells.filter((cell) => !cell.mine && cell.open).length;
      if (safeOpen === cells.length - mineCount) {
        gameOver = true;
        messageEl.textContent = "Cleared. Restart for a new board.";
        cells.forEach((cell) => {
          cell.button.disabled = true;
        });
      }
    }

    function openCell(index) {
      const cell = cells[index];
      if (gameOver || cell.open || cell.flagged) return;

      cell.open = true;
      cell.button.classList.add("open");

      if (cell.mine) {
        gameOver = true;
        messageEl.textContent = "Mine hit. Restart for a new board.";
        revealAll();
        return;
      }

      cell.button.textContent = cell.count || "";
      cell.button.disabled = true;

      if (cell.count === 0) {
        neighbors(index).forEach(openCell);
      }

      checkWin();
    }

    function toggleFlag(index) {
      const cell = cells[index];
      if (gameOver || cell.open) return;
      cell.flagged = !cell.flagged;
      cell.button.textContent = cell.flagged ? "F" : "";
      updateFlags();
    }

    function reset() {
      cells.length = 0;
      boardEl.textContent = "";
      gameOver = false;
      messageEl.textContent = "Open a safe square.";

      for (let index = 0; index < size * size; index += 1) {
        const button = document.createElement("button");
        button.className = "cell";
        button.type = "button";
        button.setAttribute("aria-label", `Cell ${index + 1}`);
        button.addEventListener("click", () => openCell(index));
        button.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          toggleFlag(index);
        });
        boardEl.append(button);
        cells.push({ button, mine: false, count: 0, open: false, flagged: false });
      }

      setMines();
      updateMineCounts();
      updateFlags();
    }

    restartButton.addEventListener("click", reset);
    reset();
  </script>
</body>
</html>
