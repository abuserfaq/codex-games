<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 860" role="img" aria-labelledby="title desc">
  <title id="title">Mastermind brass board frame</title>
  <desc id="desc">A polished brass frame with dark enamel paneling for the Mastermind game board.</desc>
  <defs>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4dfaa"/>
      <stop offset="28%" stop-color="#c48e2f"/>
      <stop offset="58%" stop-color="#f5e2b7"/>
      <stop offset="100%" stop-color="#8b5a14"/>
