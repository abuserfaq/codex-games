  <rect x="86" y="78" width="468" height="642" rx="22" fill="#17332d" stroke="rgba(255,255,255,0.12)"/>
  <rect x="86" y="736" width="468" height="54" rx="20" fill="#17332d" stroke="rgba(255,255,255,0.12)"/>
  <g fill="#f4dfaa" opacity="0.34">
