    <header class="game-header">
      <h1>Memory Match</h1>
      <p>Flip two cards at a time and find every matching pair.</p>
    </header>

    <div class="statusbar" role="status">
      <span>Moves: <strong id="moves">0</strong></span>
      <span id="message">Find the pairs.</span>
    </div>
    <div class="memory-board" id="board" aria-label="Memory Match board"></div>
    <div class="statusbar">
      <span class="hint">Matched pairs stay open.</span>
      <button class="button" id="restart" type="button">Shuffle</button>
    </div>
  </main>

  <script>
    const boardEl = document.querySelector("#board");
    const movesEl = document.querySelector("#moves");
    const messageEl = document.querySelector("#message");
    const restartButton = document.querySelector("#restart");

    const symbols = ["A", "B", "C", "D", "E", "F", "G", "H"];
    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let locked = false;
    let moves = 0;

    function shuffle(list) {
      const result = [...list];
      for (let index = result.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [result[index], result[swapIndex]] = [result[swapIndex], result[index]];
      }
      return result;
    }

    function render() {
      boardEl.textContent = "";
      cards.forEach((card, index) => {
        const button = document.createElement("button");
        button.className = card.matched ? "memory-card matched" : "memory-card";
        button.type = "button";
        button.textContent = card.open || card.matched ? card.symbol : "?";
        button.disabled = card.open || card.matched || locked;
        button.setAttribute("aria-label", card.open || card.matched ? `Card ${card.symbol}` : "Hidden card");
        button.addEventListener("click", () => flip(index));
        boardEl.append(button);
      });
      movesEl.textContent = moves;
    }

    function finishTurn() {
      if (firstCard.symbol === secondCard.symbol) {
        firstCard.matched = true;
        secondCard.matched = true;
        messageEl.textContent = cards.every((card) => card.matched) ? "Cleared. Shuffle again." : "Pair found.";
        firstCard = null;
        secondCard = null;
        render();
        return;
      }

      locked = true;
      messageEl.textContent = "Try another pair.";
      render();
      setTimeout(() => {
        firstCard.open = false;
        secondCard.open = false;
        firstCard = null;
        secondCard = null;
        locked = false;
        render();
      }, 700);
    }

    function flip(index) {
      if (locked) return;
      const card = cards[index];
      if (card.open || card.matched) return;

      card.open = true;
      if (!firstCard) {
        firstCard = card;
        messageEl.textContent = "Pick one more.";
        render();
        return;
      }

      secondCard = card;
      moves += 1;
      finishTurn();
    }

    function reset() {
      cards = shuffle([...symbols, ...symbols]).map((symbol) => ({
        symbol,
        open: false,
        matched: false
      }));
      firstCard = null;
      secondCard = null;
      locked = false;
      moves = 0;
      messageEl.textContent = "Find the pairs.";
      render();
    }

    restartButton.addEventListener("click", reset);
    reset();
  </script>
</body>
